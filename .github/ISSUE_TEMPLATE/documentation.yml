name: Documentation Update
description: Report missing, incorrect, or unclear documentation
title: "docs: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for documentation issues: missing content, incorrect information,
        broken links, or clarity improvements.

  - type: dropdown
    id: doc-type
    attributes:
      label: Documentation area
      options:
        - CONTRACT_API.md (contract entrypoints)
        - CONTRACT_SPEC.md (invariants / security model)
        - CONTRACT_EVENTS.md (event schema)
        - CONTRIBUTING.md (contributor guide)
        - DEVELOPER_ONBOARDING.md
        - DEPLOYMENT_RUNBOOK.md
        - README.md
        - web/ inline docs (JSDoc / TypeScript types)
        - Other
    validations:
      required: true

  - type: dropdown
    id: issue-type
    attributes:
      label: Issue type
      options:
        - Missing documentation
        - Incorrect information
        - Outdated content
        - Broken link
        - Clarity / wording improvement
        - New section needed
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: File / section
      description: Path and section heading where the issue is (or where new docs should go)
      placeholder: docs/CONTRACT_API.md § Pool Management › create_pool
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is wrong, missing, or unclear? Include the current text if correcting existing content.
    validations:
      required: true

  - type: textarea
    id: suggested-change
    attributes:
      label: Suggested change (optional)
      description: Draft text or outline for the improvement
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I have searched for existing documentation issues
          required: true
        - label: The issue is not already tracked in an open PR
          required: true