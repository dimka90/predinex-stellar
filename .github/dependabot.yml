version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "npm"
    groups:
      npm-non-major:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"

  - package-ecosystem: "cargo"
    directory: "/contracts/predinex"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "cargo"
    groups:
      cargo-non-major:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
